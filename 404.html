<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden – fein und blumig</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="logo_feinundblumig.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --rose-pale:  #faf0f0;
      --rose-soft:  #f2d5d5;
      --rose-mid:   #d9a0a0;
      --rose-deep:  #b56b6b;
      --rose-dark:  #7a3f3f;
      --cream:      #fdf8f4;
      --bark:       #3a2e2e;
      --bark-light: #6b5555;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      background: var(--rose-pale);
      color: var(--bark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .logo {
      width: 90px; height: 90px;
      object-fit: contain;
      margin-bottom: 2rem;
      opacity: 0.85;
    }
    .error-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 300;
      font-style: italic;
      color: var(--rose-mid);
      line-height: 1;
      margin-bottom: 0.5rem;
    }
    .error-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 300;
      font-style: italic;
      color: var(--bark);
      margin-bottom: 1rem;
    }
    .error-text {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--bark-light);
      max-width: 420px;
      margin-bottom: 2.5rem;
    }
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.9rem 2.4rem;
      background: var(--rose-deep);
      color: white;
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background 0.3s, transform 0.2s;
    }
    .home-btn:hover { background: var(--rose-dark); transform: translateY(-2px); }
    .divider {
      width: 40px; height: 1px;
      background: var(--rose-mid);
      margin: 1.5rem auto;
    }
  </style>
</head>
<body>
  <img src="logo_feinundblumig.png" alt="fein und blumig Logo" class="logo"/>
  <p class="error-code">404</p>
  <h1 class="error-title">Diese Seite ist leider verwelkt</h1>
  <div class="divider"></div>
  <p class="error-text">Die gesuchte Seite konnte leider nicht gefunden werden. Vielleicht wurde sie verschoben oder existiert nicht mehr.</p>
  <a href="index.html" class="home-btn">🌸 Zur Startseite</a>
</body>
</html>
